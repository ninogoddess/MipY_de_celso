<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapscrap | Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg) 100%);
        }
        .container { width: 100%; max-width: 800px; }
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 1.5rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1rem;
            min-height: 180px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 20px var(--primary-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--primary-glow);
        }
        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .results {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .result-item {
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .status-success { border-left-color: var(--success); }
        .status-skipped { border-left-color: var(--primary); }
        .status-error { border-left-color: var(--error); }
        .loader {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Scrapscrap UI</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Motor de Extracción y Persistencia • Fase 3</p>
        </div>
        
        <div class="glass-panel">
            <label style="display: block; margin-bottom: 0.8rem; font-weight: 600; color: var(--text-muted);">
                URLs de YouTube (Una por línea)
            </label>
            <textarea id="urlsInput" placeholder="https://www.youtube.com/watch?v=WYkT_5jT0yU&#10;https://www.youtube.com/watch?v=kYxCRzMAyG4"></textarea>
            <button id="scrapeBtn" onclick="startScraping()">
                <span id="btnText">Iniciar Scraping hacia Supabase</span>
                <div id="loader" class="loader"></div>
            </button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        async function startScraping() {
            const input = document.getElementById('urlsInput').value;
            const urls = input.split('\n').map(u => u.trim()).filter(u => u);
            
            if(urls.length === 0) return alert("Ingresa al menos una URL válida.");

            const btn = document.getElementById('scrapeBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const resultsDiv = document.getElementById('results');
            
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Procesando en la Nube...';
            resultsDiv.innerHTML = '';

            try {
                // Llamada a la función Serverless de Vercel (Python)
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urls })
                });
                
                const data = await response.json();
                
                if(!response.ok) {
                    throw new Error(data.error || "Error de servidor en Vercel");
                }

                data.results.forEach(res => {
                    const div = document.createElement('div');
                    div.className = `result-item status-${res.status}`;
                    
                    let badgeColor = res.status === 'success' ? 'var(--success)' : (res.status === 'error' ? 'var(--error)' : 'var(--primary)');
                    
                    div.innerHTML = `
                        <div style="max-width: 80%;">
                            <strong style="font-size: 1.1rem;">${res.title || res.url}</strong><br>
                            <small style="color: var(--text-muted); word-break: break-all;">${res.message || res.url}</small>
                        </div>
                        <span style="font-weight: 700; text-transform: uppercase; font-size: 0.85rem; color: ${badgeColor};">
                            ${res.status}
                        </span>
                    `;
                    resultsDiv.appendChild(div);
                });

            } catch (error) {
                resultsDiv.innerHTML = `<div class="result-item status-error">
                    <div><strong>Error Crítico:</strong><br><small>${error.message}</small></div>
                </div>`;
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Iniciar Scraping hacia Supabase';
            }
        }
    </script>
</body>
</html>
